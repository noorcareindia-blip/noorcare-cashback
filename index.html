<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noorcare Cashback</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f9d58,#34a853);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:350px;
background:#fff;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.25);
}

h1{
color:#0f9d58;
margin-bottom:10px;
}

p{
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
border:2px solid #ddd;
border-radius:8px;
font-size:16px;
margin-bottom:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#0f9d58;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#0b7d45;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
color:#0f9d58;
}
</style>
</head>

<body>

<div class="container">

<h1>Noorcare India</h1>

<p>Enter your cashback code</p>

<input
type="text"
id="code"
placeholder="Enter Cashback Code">

<button onclick="claim()">
Claim Cashback
</button>

<div id="result"></div>

</div>

<script>

function claim(){

let rewards=[20,20,20,20,20,30,30,30,40,50];

let amount=rewards[Math.floor(Math.random()*rewards.length)];

document.getElementById("result").innerHTML=
"🎉 Congratulations!<br><br>You Won ₹"+amount+
"<br><br>Send this screenshot on WhatsApp to receive cashback.";

  const code=document.getElementById("code").value.trim();

if(code==""){
alert("Please enter cashback code");
return;
}

if(localStorage.getItem(code)){
document.getElementById("result").innerHTML=
"❌ This cashback code has already been claimed on this device.";
return;
}

localStorage.setItem(code,amount);

}
}
</script>
</body>
</html>

</script>
</body>
</html>
